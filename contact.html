    <main>
        <section class="f_container">
            <form action="get">
                <label for="name">Name</label>
                <input type="text" name="name" id="f_name" placeholder="Enter your name" required>

                <label for="email">Email</label>
                <input type="email" name="email" id="f_mail" placeholder="example@mail.com" required>

                <label for="message">Message</label>
                <textarea name="message" id="f_txtarea" rows="4" placeholder="Your desire!"></textarea>

                <div class="button">
                    <button class="btn b-cont" type="submit">Submit</button>
                </div>
            </form>
        </section>
    </main>
